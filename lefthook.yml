pre-commit:
  parallel: true
  fail_fast: true
  commands:
    lint:
      glob: '*.{ts,tsx,astro}'
      run: pnpm lint -- {staged_files}
      stage_fixed: true

    typecheck:
      glob: '*.{ts,tsx}'
      run: pnpm typecheck

commit-msg:
  commands:
    commitlint:
      run: pnpm commitlint --edit {1}

pre-push:
  parallel: true
  fail_fast: true
  commands:
    test:
      run: pnpm test

    build:
      run: pnpm build

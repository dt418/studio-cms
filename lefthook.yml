pre-commit:
  parallel: true
  commands:
    lint:
      glob: '*.{ts,tsx,astro}'
      run: pnpm lint -- {staged_files}
      stage_fixed: true

    typecheck:
      glob: '*.{ts,tsx,astro}'
      run: pnpm typecheck

    format:
      glob: '*.{ts,tsx,astro,css,json,md}'
      run: pnpm format:check

commit-msg:
  commands:
    commitlint:
      run: pnpm commitlint --edit {1}

pre-push:
  parallel: true
  commands:
    test:
      run: pnpm test

    build:
      run: pnpm build
